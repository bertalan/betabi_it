# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name new.betabi.it;

    # SSL cert verification
    location ~ \.well-known {
        allow all;
        root /www/wwwroot/new.betabi.it/dist;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name new.betabi.it;
    root /www/wwwroot/new.betabi.it/dist;
    index index.html;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/new.betabi.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.betabi.it/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets with hash (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images
    location /portfolio/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Forbidden files
    location ~ ^/(\.git|\.env|\.htaccess) {
        return 404;
    }

    access_log /www/wwwlogs/new.betabi.it.log;
    error_log /www/wwwlogs/new.betabi.it.error.log;
}
